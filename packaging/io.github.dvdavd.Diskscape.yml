app-id: io.github.dvdavd.Diskscape
runtime: org.kde.Platform
runtime-version: "6.9"
sdk: org.kde.Sdk
command: diskscape

finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=host

modules:
  - name: diskscape
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_SKIP_INSTALL_ALL_DEPENDENCY=TRUE
    make-args:
      - diskscape
    sources:
      - type: dir
        path: ..
